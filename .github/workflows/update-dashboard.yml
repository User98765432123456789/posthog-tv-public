name: Update dashboard

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Capture dashboards
        env:
          POSTHOG_DASHBOARD_URL_1: ${{ secrets.POSTHOG_DASHBOARD_URL_1 }}
          POSTHOG_DASHBOARD_URL_2: ${{ secrets.POSTHOG_DASHBOARD_URL_2 }}
          POSTHOG_DASHBOARD_URL_3: ${{ secrets.POSTHOG_DASHBOARD_URL_3 }}
          POSTHOG_DASHBOARD_URL_4: ${{ secrets.POSTHOG_DASHBOARD_URL_4 }}
          POSTHOG_DASHBOARD_URL_5: ${{ secrets.POSTHOG_DASHBOARD_URL_5 }}
          POSTHOG_DASHBOARD_URL_6: ${{ secrets.POSTHOG_DASHBOARD_URL_6 }}
          POSTHOG_DASHBOARD_URL_7: ${{ secrets.POSTHOG_DASHBOARD_URL_7 }}
          POSTHOG_DASHBOARD_URL_8: ${{ secrets.POSTHOG_DASHBOARD_URL_8 }}
        run: python scripts/capture_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard1.png dashboard2.png dashboard3.png dashboard4.png \
                  dashboard5.png dashboard6.png dashboard7.png dashboard8.png
          if git diff --quiet --cached; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update dashboard snapshot ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push
