name: Update dashboard

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Capture dashboard
        env:
          POSTHOG_DASHBOARD_URL: ${{ secrets.POSTHOG_DASHBOARD_URL }}
        run: python scripts/capture_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard.png dashboard.pdf
          if git diff --quiet --cached; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update dashboard snapshot ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push
